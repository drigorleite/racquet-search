<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>RaqueteSearch — Find Your Perfect Tennis Racket & Strings</title>
    <meta name="description" content="AI-powered tennis equipment finder. Answer 9 questions and get personalized racket and string recommendations matched to your playing style, level, and physical profile." />
    <meta name="keywords" content="tennis racket finder, best tennis racket, tennis string recommendation, tennis equipment, Wilson, Babolat, Head, Yonex" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:title" content="RaqueteSearch — Find Your Perfect Tennis Racket" />
    <meta property="og:description" content="Answer 9 questions and get AI-powered racket and string recommendations matched to your game." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://raquetesearch.com" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="RaqueteSearch — Find Your Perfect Tennis Racket" />
    <meta name="twitter:description" content="AI-powered tennis equipment finder. Get personalized racket and string recommendations." />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9440937515445471" crossorigin="anonymous"></script>

    <!-- Canonical -->
    <link rel="canonical" href="https://raquetesearch.com" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "RaqueteSearch",
      "description": "AI-powered tennis racket and string recommendation engine",
      "url": "https://raquetesearch.com",
      "applicationCategory": "SportsApplication",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"
    ></script>
  </body>
</html>
